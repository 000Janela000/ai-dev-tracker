name: Data Pipeline

on:
  schedule:
    # Run every 6 hours at :17 to avoid top-of-hour congestion
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      skip_summarize:
        description: 'Skip summarization step'
        required: false
        default: 'false'
        type: boolean
      lookback_hours:
        description: 'Override fetch lookback window in hours (default: time since last successful fetch)'
        required: false
        default: ''
        type: string

jobs:
  fetch-and-summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Fetch from all sources
        run: npx tsx --tsconfig tsconfig.json scripts/pipeline.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          PIPELINE_LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours }}

      - name: Summarize new items
        if: ${{ github.event.inputs.skip_summarize != 'true' }}
        run: npx tsx --tsconfig tsconfig.json scripts/summarize.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
